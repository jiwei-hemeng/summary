<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css 实现渐变阴影</title>
    <style>
      .gradient-shadow {
        position: relative;
        width: 300px;
        height: 200px;
        background: #fff;
        border-radius: 8px;
      }

      .gradient-shadow::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 8px;
        background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1);
        filter: blur(20px);
        opacity: 0.7;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="gradient-shadow">1233333</div>
  </body>
</html>
