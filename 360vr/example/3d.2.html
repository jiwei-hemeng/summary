<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial;
      }
    </style>
  </head>
  <body>
    <div
      style="
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px;
        border-radius: 8px;
        z-index: 100;
      "
    >
      🎉 Three.js 入门成功！拖拽鼠标查看
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // 创建场景
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050b1a);
      scene.fog = new THREE.FogExp2(0x050b1a, 0.02);

      // 创建相机
      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(4, 3, 5);
      camera.lookAt(0, 0, 0);

      // 创建渲染器
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      // 轨道控制
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // ===== 添加物体 =====

      // 地面网格（辅助视觉）
      const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
      gridHelper.position.y = -1;
      scene.add(gridHelper);

      // 彩色立方体
      const cube = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshStandardMaterial({
          color: 0xff5533,
          metalness: 0.3,
          roughness: 0.4,
        }),
      );
      cube.castShadow = true;
      cube.position.set(-1.2, 0, 0);
      scene.add(cube);

      // 金属球体
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.6, 64, 64),
        new THREE.MeshStandardMaterial({
          color: 0x33ff99,
          metalness: 0.8,
          roughness: 0.2,
        }),
      );
      sphere.castShadow = true;
      sphere.position.set(1.2, 0, 0);
      scene.add(sphere);

      // 圆柱体（你之前问的）
      const cylinder = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.5, 1.2, 48),
        new THREE.MeshStandardMaterial({
          color: 0x5577ff,
          metalness: 0.5,
          roughness: 0.3,
        }),
      );
      cylinder.castShadow = true;
      cylinder.position.set(0, 0, 1.2);
      scene.add(cylinder);

      // ===== 光源系统 =====

      // 环境光
      const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
      scene.add(ambientLight);

      // 主光源方向光
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(3, 5, 2);
      directionalLight.castShadow = true;
      scene.add(directionalLight);

      // 背光补光
      const backLight = new THREE.PointLight(0xff66aa, 0.4);
      backLight.position.set(-2, 1, -3);
      scene.add(backLight);

      // ===== 简单动画 =====
      let time = 0;

      function animate() {
        requestAnimationFrame(animate);
        time += 0.01;

        // 让立方体旋转
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.02;

        // 让球体上下浮动
        sphere.position.y = Math.sin(time) * 0.2;

        // 圆柱体旋转
        cylinder.rotation.z += 0.01;

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      // 窗口适配
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      console.log("Three.js 入门成功！");
    </script>
  </body>
</html>
